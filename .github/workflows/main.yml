name: CI Node.js Project
on:
  push:
  pull_request:
jobs:
  my-job:
    runs-on: ubuntu-latest
    steps:
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci
 
      - name: Run tests
        run: npm test
 
      - name: Build 
        run: npm run build

    

